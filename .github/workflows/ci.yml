name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images for lint and test
        run: |
          docker pull golangci/golangci-lint:v1.55.2 || true
          docker pull golang:1.21-alpine || true

      - name: Run linter in Docker
        run: make lint-docker

      - name: Run tests in Docker
        run: make test-docker | tee test-output.txt

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt